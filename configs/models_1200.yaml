download:
  allow_patterns:
    - "*.json"
    - "*.model"
    - "*.txt"
    - "*.py"
    - "*.safetensors"
    - "*.bin"
    - "tokenizer*"

extraction:
  max_prompts: 1200
  max_new_tokens: 0
  layers: [0, 4, 8, 12, 16]
  batch_size: 8
  max_length: 192
